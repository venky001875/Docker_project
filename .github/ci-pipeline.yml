name: DevOps CI Pipeline

# Trigger this workflow on every git push to the main branch
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate-and-build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your repository code onto the GitHub runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up a clean Python environment to test your scripts
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Step 3: Install dependencies and check syntax
    - name: Install Linting Tools & Check Syntax
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # Step 4: Verify Docker Build for the API Gateway
    - name: Verify Docker Build (api-gateway)
      run: |
        echo "Building API Gateway Image to test configurations..."
        docker build -t api-gateway-test:latest ./api-gateway